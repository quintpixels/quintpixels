<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuintPixels GitHub Profile README Preview</title>
  
  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <style>
    :root {
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'Fira Code', monospace;
      
      --ui-bg: #0b0a09;
      --ui-card: #141211;
      --ui-border: #242220;
      --ui-text: #e6e4e0;
      --ui-accent: #f7f5f2;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--ui-bg);
      color: var(--ui-text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    /* Top Navigation bar */
    header {
      background-color: var(--ui-card);
      border-bottom: 1px solid var(--ui-border);
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-mark {
      width: 24px;
      height: 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }
    
    .logo-pixel {
      background-color: var(--ui-accent);
    }
    .logo-pixel:nth-child(3), .logo-pixel:nth-child(4) {
      background-color: transparent;
    }
    
    .logo-text {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    
    .subtitle {
      font-size: 12px;
      color: #8b8884;
      font-weight: 400;
      letter-spacing: 0.1em;
    }
    
    .controls {
      display: flex;
      gap: 12px;
    }
    
    .btn {
      background-color: transparent;
      border: 1px solid var(--ui-border);
      color: var(--ui-text);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.2s ease;
    }
    
    .btn:hover {
      border-color: var(--ui-accent);
      background-color: rgba(255, 255, 255, 0.05);
    }
    
    .btn.active {
      background-color: var(--ui-accent);
      color: var(--ui-bg);
      border-color: var(--ui-accent);
    }
    
    /* Main Layout Grid */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }
    
    main.single-view {
      grid-template-columns: 1fr;
    }
    
    main.single-view .pane.hidden {
      display: none;
    }
    
    .pane {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
      padding: 40px;
    }
    
    .pane-header {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    /* Light Mode Container Styles */
    .pane.light-theme {
      background-color: #f7f5f2;
      color: #0b0b0a;
      border-right: 1px solid var(--ui-border);
    }
    
    .pane.light-theme .pane-header {
      color: #7a7872;
      border-bottom: 1px solid rgba(11, 11, 10, 0.1);
    }
    
    /* Dark Mode Container Styles */
    .pane.dark-theme {
      background-color: #0d0c0b;
      color: #f7f5f2;
    }
    
    .pane.dark-theme .pane-header {
      color: #c8c6c1;
      border-bottom: 1px solid rgba(247, 245, 242, 0.1);
    }
    
    /* GitHub Profile Sandbox Layout */
    .github-profile-card {
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 32px;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    }
    
    .light-theme .github-profile-card {
      background-color: #ffffff;
      border-color: #e0ddd8;
    }
    
    .dark-theme .github-profile-card {
      background-color: #0d0c0b;
      border-color: #2a2826;
    }
    
    /* Markdown Elements Render Styling */
    .markdown-body {
      font-size: 15px;
      line-height: 1.6;
    }
    
    .markdown-body img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    
    .markdown-body h3 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }
    
    .light-theme .markdown-body h3 {
      color: #0b0b0a;
    }
    .dark-theme .markdown-body h3 {
      color: #f7f5f2;
    }
    
    .markdown-body p {
      margin-bottom: 16px;
    }
    
    .markdown-body blockquote {
      padding: 0 16px;
      border-left: 4px solid #d0d7de;
      margin-bottom: 20px;
      font-style: italic;
    }
    
    .light-theme .markdown-body blockquote {
      color: #57606a;
      border-left-color: #e0ddd8;
    }
    .dark-theme .markdown-body blockquote {
      color: #c8c6c1;
      border-left-color: #2a2826;
    }
    
    .markdown-body ul {
      padding-left: 20px;
      margin-bottom: 20px;
    }
    
    .markdown-body li {
      margin-bottom: 6px;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    
    .markdown-body li code {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    
    .light-theme .markdown-body li code {
      background-color: #f0ede9;
      color: #0b0b0a;
    }
    .dark-theme .markdown-body li code {
      background-color: #161513;
      color: #f7f5f2;
    }
    
    .markdown-body hr {
      height: 1px;
      border: 0;
      margin: 28px 0;
    }
    
    .light-theme .markdown-body hr {
      background-color: #e0ddd8;
    }
    .dark-theme .markdown-body hr {
      background-color: #2a2826;
    }
    
    /* Table Styling */
    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
      font-size: 13px;
    }
    
    .markdown-body th, .markdown-body td {
      padding: 10px 12px;
      border: 1px solid #d0d7de;
      text-align: left;
    }
    
    .light-theme .markdown-body th, .light-theme .markdown-body td {
      border-color: #e0ddd8;
    }
    .dark-theme .markdown-body th, .dark-theme .markdown-body td {
      border-color: #2a2826;
    }
    
    .markdown-body th {
      font-weight: 600;
      font-family: var(--font-display);
    }
    
    .light-theme .markdown-body th {
      background-color: #f0ede9;
    }
    .dark-theme .markdown-body th {
      background-color: #161513;
    }
    
    .markdown-body td code {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 2px 4px;
      border-radius: 3px;
      background-color: rgba(0, 0, 0, 0.05);
    }
    
    .dark-theme .markdown-body td code {
      background-color: rgba(255, 255, 255, 0.05);
    }
    
    /* Labs Grid Table */
    .markdown-body table[width="100%"] {
      border: none;
    }
    .markdown-body table[width="100%"] td {
      border: 1px solid transparent;
      padding: 16px;
      border-radius: 6px;
    }
    
    .light-theme .markdown-body table[width="100%"] td {
      background-color: #fbfaf8;
      border-color: #e0ddd8;
    }
    .dark-theme .markdown-body table[width="100%"] td {
      background-color: #161513;
      border-color: #2a2826;
    }
    
    .markdown-body table[width="100%"] strong {
      font-family: var(--font-display);
      font-size: 14px;
      display: block;
      margin-bottom: 4px;
    }
    
    .markdown-body table[width="100%"] small {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: #8b8884;
      display: block;
      margin-bottom: 12px;
    }
    
    /* Picture alignments & sizing */
    .markdown-body div[align="center"] {
      text-align: center;
      margin: 20px 0;
    }
    
    .markdown-body .picture-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin: 24px 0;
    }
    
    .markdown-body .picture-row picture, .markdown-body .picture-row img {
      height: 120px;
      width: auto;
    }
    
    /* Links style */
    .markdown-body a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    
    .markdown-body a:hover {
      opacity: 0.8;
    }
    
    .markdown-body h5 {
      font-size: 13px;
      font-family: var(--font-display);
      font-weight: 500;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  
  <header>
    <div class="logo">
      <div class="logo-mark">
        <div class="logo-pixel"></div>
        <div class="logo-pixel"></div>
        <div class="logo-pixel"></div>
        <div class="logo-pixel"></div>
        <div class="logo-pixel"></div>
        <div class="logo-pixel"></div>
        <div class="logo-pixel"></div>
        <div class="logo-pixel"></div>
        <div class="logo-pixel"></div>
      </div>
      <div>
        <div class="logo-text">QuintPixels</div>
        <div class="subtitle">PROFILE README PREVIEW</div>
      </div>
    </div>
    
    <div class="controls">
      <button class="btn active" id="btn-side" onclick="setViewMode('side')">Side-by-Side</button>
      <button class="btn" id="btn-light" onclick="setViewMode('light')">Light Only</button>
      <button class="btn" id="btn-dark" onclick="setViewMode('dark')">Dark Only</button>
    </div>
  </header>
  
  <main id="preview-grid">
    <!-- Light Mode Pane -->
    <section class="pane light-theme" id="pane-light">
      <div class="pane-header">
        <span>GitHub Light Mode</span>
        <span style="font-size: 11px; font-weight: 400; font-family: var(--font-sans)">theme: light / bg: #ffffff</span>
      </div>
      <div class="github-profile-card">
        <article class="markdown-body" id="content-light">
          <!-- Dynamically Rendered Light Content -->
        </article>
      </div>
    </section>
    
    <!-- Dark Mode Pane -->
    <section class="pane dark-theme" id="pane-dark">
      <div class="pane-header">
        <span>GitHub Dark Mode</span>
        <span style="font-size: 11px; font-weight: 400; font-family: var(--font-sans)">theme: dark / bg: #0d0c0b</span>
      </div>
      <div class="github-profile-card">
        <article class="markdown-body" id="content-dark">
          <!-- Dynamically Rendered Dark Content -->
        </article>
      </div>
    </section>
  </main>
  
  <script>
    function setViewMode(mode) {
      const grid = document.getElementById('preview-grid');
      const paneLight = document.getElementById('pane-light');
      const paneDark = document.getElementById('pane-dark');
      
      document.getElementById('btn-side').classList.remove('active');
      document.getElementById('btn-light').classList.remove('active');
      document.getElementById('btn-dark').classList.remove('active');
      
      if (mode === 'side') {
        grid.classList.remove('single-view');
        paneLight.classList.remove('hidden');
        paneDark.classList.remove('hidden');
        document.getElementById('btn-side').classList.add('active');
      } else if (mode === 'light') {
        grid.classList.add('single-view');
        paneLight.classList.remove('hidden');
        paneDark.classList.add('hidden');
        document.getElementById('btn-light').classList.add('active');
      } else if (mode === 'dark') {
        grid.classList.add('single-view');
        paneLight.classList.add('hidden');
        paneDark.classList.remove('hidden');
        document.getElementById('btn-dark').classList.add('active');
      }
    }
    
    async function loadMarkdown() {
      try {
        const response = await fetch('README.md');
        if (!response.ok) {
          throw new Error('Failed to load README.md');
        }
        const markdown = await response.text();
        
        // Parse markdown to HTML
        const htmlContent = marked.parse(markdown);
        
        // Populate light theme and dark theme containers
        const containerLight = document.getElementById('content-light');
        const containerDark = document.getElementById('content-dark');
        
        containerLight.innerHTML = htmlContent;
        containerDark.innerHTML = htmlContent;
        
        // Post-process HTML to isolate SVG modes for preview purposes
        // Light mode post-processing
        containerLight.querySelectorAll('picture').forEach(picture => {
          // Find light source img (the default img src is light-mode)
          const img = picture.querySelector('img');
          if (img) {
            let src = img.getAttribute('src');
            // If it's github-readme-stats, ensure light mode params
            if (src.includes('github-readme-stats.vercel.app')) {
              src = src.replace('hide_title=true', 'hide_title=true&bg_color=f7f5f2&text_color=0b0b0a&icon_color=7a7872&title_color=0b0b0a&border_color=e0ddd8');
            }
            if (src.includes('github-readme-streak-stats.herokuapp.com')) {
              src = src.replace('hide_border=false', 'hide_border=false&background=f7f5f2&text=7a7872&sideNums=0b0b0a&sideTitle=7a7872&fire=0b0b0a&ring=0b0b0a&currStreakNum=0b0b0a&currStreakLabel=7a7872&border=e0ddd8');
            }
            const newImg = document.createElement('img');
            newImg.setAttribute('src', src);
            newImg.setAttribute('alt', img.getAttribute('alt') || '');
            picture.replaceWith(newImg);
          }
        });
        
        // Dark mode post-processing
        containerDark.querySelectorAll('picture').forEach(picture => {
          // Find dark mode source
          const source = picture.querySelector('source');
          const img = picture.querySelector('img');
          if (source || img) {
            let src = source ? source.getAttribute('srcset') : img.getAttribute('src');
            // If it's github-readme-stats, ensure dark mode params
            if (src.includes('github-readme-stats.vercel.app')) {
              src = src.replace('hide_title=true', 'hide_title=true&bg_color=0d0c0b&text_color=f7f5f2&icon_color=c8c6c1&title_color=f7f5f2&border_color=2a2826');
            }
            if (src.includes('github-readme-streak-stats.herokuapp.com')) {
              src = src.replace('hide_border=false', 'hide_border=false&background=0d0c0b&text=c8c6c1&sideNums=f7f5f2&sideTitle=c8c6c1&fire=f7f5f2&ring=f7f5f2&currStreakNum=f7f5f2&currStreakLabel=c8c6c1&border=2a2826');
            }
            const newImg = document.createElement('img');
            newImg.setAttribute('src', src);
            newImg.setAttribute('alt', (img ? img.getAttribute('alt') : '') || '');
            picture.replaceWith(newImg);
          }
        });
        
        // Convert any streak stats containers or sibling images in metrics section to display in row
        [containerLight, containerDark].forEach(container => {
          // Find center elements with images
          container.querySelectorAll('div[align="center"]').forEach(div => {
            const imgs = div.querySelectorAll('img');
            if (imgs.length >= 2) {
              div.className = 'picture-row';
            }
          });
        });
        
      } catch (err) {
        console.error(err);
        document.getElementById('content-light').innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
        document.getElementById('content-dark').innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
      }
    }
    
    window.addEventListener('DOMContentLoaded', loadMarkdown);
  </script>
</body>
</html>
